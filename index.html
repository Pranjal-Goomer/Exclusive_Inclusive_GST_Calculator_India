<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator India</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-switch">
    <button id="themeBtn">🌙 Dark Mode</button>
</div>

<div class="container">

    <h1>GST Calculator India</h1>

    <p class="subtitle">
        Calculate GST instantly with Inclusive and Exclusive GST modes.
    </p>

    <div class="input-group">
        <label>Amount (₹)</label>
        <input
            type="number"
            id="amount"
            placeholder="Enter amount"
        >
    </div>

    <div class="input-group">
        <label>GST Rate</label>

        <select id="gstRate">
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18" selected>18%</option>
            <option value="28">28%</option>
        </select>
    </div>

    <div class="input-group">
        <label>Calculation Type</label>

        <select id="calculationType">

            <option value="exclusive">
                Add GST (Exclusive)
            </option>

            <option value="inclusive">
                Remove GST (Inclusive)
            </option>

        </select>
    </div>

    <div class="btn-group">

        <button onclick="calculateGST()">
            Calculate GST
        </button>

        <button
            class="reset-btn"
            onclick="resetCalculator()"
        >
            Reset
        </button>

    </div>

    <div class="result-box">

        <div class="result-row">
            <span>Base Amount</span>
            <span>₹<span id="baseAmount">0.00</span></span>
        </div>

        <div class="result-row">
            <span>GST Amount</span>
            <span>₹<span id="gstAmount">0.00</span></span>
        </div>

        <div class="result-row">
            <span>Total Amount</span>
            <span>₹<span id="totalAmount">0.00</span></span>
        </div>

    </div>

    <div class="footer">

        <p><strong>Pranjal Goomer</strong></p>

        <p>pranjalgoomer51@gmail.com</p>

        <a
            href="https://digitalheroesco.com"
            target="_blank"
        >
            <button class="dh-btn">
                Built for Digital Heroes
            </button>
        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
